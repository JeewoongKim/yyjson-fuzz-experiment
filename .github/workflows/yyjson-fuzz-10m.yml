name: yyjson AFL++ 10m fuzzing

on:
  workflow_dispatch:
    inputs:
      sanitizer:
        description: "Sanitizer"
        required: true
        default: "address"
        type: choice
        options:
          - address
          - undefined

permissions:
  contents: read

jobs:
  afl-fuzz-10m:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout experiment repository
        uses: actions/checkout@v4
        with:
          path: experiment

      - name: Checkout OSS-Fuzz
        uses: actions/checkout@v4
        with:
          repository: google/oss-fuzz
          path: oss-fuzz

      - name: Checkout yyjson
        uses: actions/checkout@v4
        with:
          repository: ibireme/yyjson
          path: yyjson-local

      - name: Add incremental reader fuzz target
        run: |
          cp experiment/fuzz/incr_fuzzer.c yyjson-local/fuzz/incr_fuzzer.c
          ls -lh yyjson-local/fuzz/incr_fuzzer.c

      - name: Patch OSS-Fuzz yyjson build.sh
        run: |
          cat >> oss-fuzz/projects/yyjson/build.sh <<'EOF'

          # Build the incremental reader fuzz target.
          $CC $CFLAGS -I src -c fuzz/incr_fuzzer.c -o incr_fuzzer.o
          $CXX $CXXFLAGS incr_fuzzer.o -o $OUT/yyjson_incr_fuzzer \
            $LIB_FUZZING_ENGINE build/libyyjson.a

          cp fuzz/fuzzer.dict $OUT/yyjson_incr_fuzzer.dict
          zip -jq $OUT/yyjson_incr_fuzzer_seed_corpus.zip /tmp/yyjson_corpus/*
          EOF

          echo "===== patched build.sh ====="
          tail -n 20 oss-fuzz/projects/yyjson/build.sh

      - name: Build OSS-Fuzz image
        run: |
          cd oss-fuzz
          python3 infra/helper.py build_image --pull yyjson

      - name: Build fuzzers with AFL++
        run: |
          cd oss-fuzz
          python3 infra/helper.py build_fuzzers \
            --engine afl \
            --sanitizer=${{ inputs.sanitizer }} \
            --clean \
            yyjson "$GITHUB_WORKSPACE/yyjson-local"

      - name: Show build output
        run: |
          echo "===== build/out/yyjson ====="
          ls -lh oss-fuzz/build/out/yyjson

          echo "===== seed corpus zip ====="
          ls -lh oss-fuzz/build/out/yyjson/yyjson_incr_fuzzer_seed_corpus.zip

      - name: Check AFL++ build
        run: |
          cd oss-fuzz
          python3 infra/helper.py check_build \
            --engine afl \
            --sanitizer=${{ inputs.sanitizer }} \
            yyjson yyjson_incr_fuzzer

      - name: Run AFL++ fuzzing for 10 minutes
        id: fuzz
        continue-on-error: true
        run: |
          mkdir -p "$GITHUB_WORKSPACE/corpus"
          mkdir -p "$GITHUB_WORKSPACE/logs"

          cd oss-fuzz

          set +e
          python3 infra/helper.py run_fuzzer \
            --engine afl \
            --sanitizer=${{ inputs.sanitizer }} \
            -e AFL_NO_UI=1 \
            -e AFL_FUZZER_ARGS= \
            --corpus-dir="$GITHUB_WORKSPACE/corpus" \
            yyjson yyjson_incr_fuzzer \
            -- \
            -V 600 \
            2>&1 | tee "$GITHUB_WORKSPACE/logs/afl_${{ inputs.sanitizer }}_10m.log"

          status=${PIPESTATUS[0]}
          echo "$status" > "$GITHUB_WORKSPACE/logs/exit_status.txt"

          if [ "$status" -ne 0 ]; then
            echo "afl_status=failed" >> "$GITHUB_OUTPUT"
          else
            echo "afl_status=success" >> "$GITHUB_OUTPUT"
          fi

          exit 0

      - name: Collect AFL++ output
        if: always()
        run: |
          mkdir -p "$GITHUB_WORKSPACE/results"

          echo "===== corpus after fuzzing ====="
          find "$GITHUB_WORKSPACE/corpus" -type f | head -100 || true
          find "$GITHUB_WORKSPACE/corpus" -type f | wc -l || true

          echo "===== AFL++ output directories ====="
          find oss-fuzz/build/out/yyjson -maxdepth 2 -type d -name "*_afl_${{ inputs.sanitizer }}_out" -print || true

          AFL_OUT="oss-fuzz/build/out/yyjson/yyjson_incr_fuzzer_afl_${{ inputs.sanitizer }}_out"

          if [ -d "$AFL_OUT" ]; then
            echo "Found AFL output: $AFL_OUT"
            cp -a "$AFL_OUT" "$GITHUB_WORKSPACE/results/afl-output"
          else
            echo "AFL output directory not found: $AFL_OUT"
            echo "Dumping build/out/yyjson:"
            find oss-fuzz/build/out/yyjson -maxdepth 3 -print || true
          fi

          echo "===== crash files ====="
          find "$GITHUB_WORKSPACE/results" -path "*/crashes/*" -type f || true

          echo "===== hang files ====="
          find "$GITHUB_WORKSPACE/results" -path "*/hangs/*" -type f || true

      - name: Upload fuzzing results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: yyjson-incr-afl-${{ inputs.sanitizer }}-10m-results
          path: |
            corpus
            logs
            results
          retention-days: 7

      - name: Fail if AFL++ returned non-zero
        if: steps.fuzz.outputs.afl_status == 'failed'
        run: |
          echo "AFL++ or sanitizer returned non-zero. Check uploaded logs and results."
          exit 1
